<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>XenolithGraph 10,000ノード 限界負荷テスト</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0b0b0b;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #eeeeee;
    }
    #editor-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.2rem;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 10;
      text-align: center;
      line-height: 1.8;
    }
    .loaded #loading { opacity: 0; }
    
    .spinner {
      border: 4px solid rgba(252, 180, 0, 0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border-left-color: #FCB400;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    #guide {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(22, 22, 22, 0.95);
      border: 1px solid #c8963e;
      padding: 15px;
      border-radius: 8px;
      z-index: 5;
      max-width: 480px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      pointer-events: none;
    }
    #guide h2 {
      margin: 0 0 10px;
      font-size: 1.1rem;
      color: #FCB400;
    }
    #guide ul {
      margin: 0;
      padding-left: 20px;
      font-size: 0.85rem;
      line-height: 1.6;
      color: #cccccc;
    }
    #guide .accent {
      color: #FCB400;
      font-weight: 600;
    }

    /* エディタ標準の統計表示（FPS表示）を100px下に下げる */
    [data-xeno-stats] {
      top: 112px !important;
    }

    /* 入力欄上でカーソルを通常の矢印にする（PIXI.jsが設定するカーソルを上書き） */
    #editor-container canvas {
      cursor: default !important;
    }

    .copyright {
      position: absolute;
      bottom: 10px;
      right: 15px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.35);
      z-index: 100;
      pointer-events: none;
      font-family: monospace;
    }
  </style>

  <!-- PIXI.js v8.6.0 & XenolithGraph 依存モジュールのインポート設定 -->
  <script>
    const BASE = 'https://unpkg.com/@xenolithengine/graph-render-pixi@0.7.0-beta.3/dist/';

    async function initPatch() {
      try {
        console.log('パッチ処理を開始...');

        // 1. comment-renderer.js のロードとパッチ
        // PIXI.js v8.6.0 で FillGradient に .destroy() が存在しないクラッシュをガードするパッチ
        const commentRes = await fetch(BASE + 'comment-renderer.js');
        let commentCode = await commentRes.text();

        commentCode = commentCode.replace(/from '\.\//g, "from '" + BASE);
        commentCode = commentCode.replace(/from "\.\//g, "from \"" + BASE);
        commentCode = commentCode.replace(/import\('\.\//g, "import('" + BASE);
        
        commentCode = commentCode.replace(
          /highlightGrad\.destroy\(\);/g,
          'if (highlightGrad && typeof highlightGrad.destroy === "function") highlightGrad.destroy();'
        );
        commentCode = commentCode.replace(
          /rimGrad\.destroy\(\);/g,
          'if (rimGrad && typeof rimGrad.destroy === "function") rimGrad.destroy();'
        );
        commentCode = commentCode.replace(
          /headerFill\.destroy\(\);/g,
          'if (headerFill && typeof headerFill.destroy === "function") headerFill.destroy();'
        );

        const commentBlobUrl = URL.createObjectURL(new Blob([commentCode], { type: 'application/javascript' }));
        console.log('comment-renderer.js パッチ適用完了:', commentBlobUrl);

        // 2. widget-renderer.js のロードとパッチ
        // 出力端子の文字「out」と入力ウィジェットが重ならないように、非スクエアウィジェットの幅を調整するパッチ（マージン 45px 確保）
        const widgetRes = await fetch(BASE + 'widget-renderer.js');
        let widgetCode = await widgetRes.text();

        widgetCode = widgetCode.replace(/from '\.\//g, "from '" + BASE);
        widgetCode = widgetCode.replace(/from "\.\//g, "from \"" + BASE);
        widgetCode = widgetCode.replace(/import\('\.\//g, "import('" + BASE);
        
        widgetCode = widgetCode.replace(
          "wW = width - wX - padX;",
          "wW = width - wX - padX - 45;"
        );

        const widgetBlobUrl = URL.createObjectURL(new Blob([widgetCode], { type: 'application/javascript' }));
        console.log('widget-renderer.js パッチ適用完了:', widgetBlobUrl);

        // 3. graph-editor.js のロードとパッチ
        const editorRes = await fetch("https://unpkg.com/@xenolithengine/graph-editor@0.7.0-beta.3/dist/index.js");
        let editorCode = await editorRes.text();

        const EDITOR_BASE = "https://unpkg.com/@xenolithengine/graph-editor@0.7.0-beta.3/dist/";
        
        const patchEditor = (target, replacement, name) => {
          const before = editorCode;
          editorCode = editorCode.replace(target, replacement);
          if (editorCode === before) {
            console.error('パッチ適用失敗:', name);
          } else {
            console.log('パッチ適用成功:', name);
          }
        };

        editorCode = editorCode.replace(/from '\.\//g, "from '" + EDITOR_BASE);
        editorCode = editorCode.replace(/from "\.\//g, "from \"" + EDITOR_BASE);
        editorCode = editorCode.replace(/import\('\.\//g, "import('" + EDITOR_BASE);

        patchEditor(
          "return !!bind && widgetVisibility(w) === 'always' && this.#isPinConnected(node.id, bind);",
          "return false;",
          "always editable"
        );

        // スライダードラッグの座標変換修正パッチ: getLocalPosition を用いて正確なローカル座標を取得する
        const patchedValueAt = [
          "const valueAt = (ev) => {",
          "            const local = ev.getLocalPosition(view.container);",
          "            if (spec.type === 'slider') {",
          "                const frac = Math.min(1, Math.max(0, (local.x - rect.x) / rect.width));",
          "                return spec.min + frac * (spec.max - spec.min);",
          "            }",
          "            const startNode = this.graph.getNode(nodeId);",
          "            const base = startNode ? Number(widgetValue(startNode, spec)) : 0;",
          "            const step = spec.type === 'number' ? (spec.step ?? 1) : 1;",
          "            const dx = local.x - startLocalX;",
          "            return base + Math.round(dx / 4) * step;",
          "        };",
          "        const startLocalX = e.getLocalPosition(view.container).x;"
        ].join("\n");

        const targetValueAtBlock = [
          "const valueAt = (globalX) => {",
          "            const local = view.container.toLocal({ x: globalX, y: 0 });",
          "            if (spec.type === 'slider') {",
          "                const frac = Math.min(1, Math.max(0, (local.x - rect.x) / rect.width));",
          "                return spec.min + frac * (spec.max - spec.min);",
          "            }",
          "            // number: scrub — 1 step per \`scrubPx\` of horizontal travel from the press point.",
          "            const startNode = this.graph.getNode(nodeId);",
          "            const base = startNode ? Number(widgetValue(startNode, spec)) : 0;",
          "            const step = spec.type === 'number' ? (spec.step ?? 1) : 1;",
          "            const dx = local.x - startLocalX;",
          "            return base + Math.round(dx / 4) * step;",
          "        };",
          "        const startLocalX = view.container.toLocal({ x: e.global.x, y: 0 }).x;"
        ].join("\n");

        patchEditor(targetValueAtBlock, patchedValueAt, "valueAt block rewrite to getLocalPosition");

        patchEditor(
          "const clamped = clampWidgetValue(spec, valueAt(ev.global.x));",
          "const clamped = clampWidgetValue(spec, valueAt(ev));",
          "onMove valueAt params"
        );

        patchEditor(
          "this.setWidgetValue(nodeId, spec.id, valueAt(ev.global.x));",
          "this.setWidgetValue(nodeId, spec.id, valueAt(ev));",
          "onUp valueAt params"
        );

        const editorBlobUrl = URL.createObjectURL(new Blob([editorCode], { type: 'application/javascript' }));
        console.log('graph-editor.js パッチ適用完了:', editorBlobUrl);

        const im = document.createElement('script');
        im.type = 'importmap';
        im.textContent = JSON.stringify({
          imports: {
            "pixi.js": "https://unpkg.com/pixi.js@8.6.0/dist/pixi.min.mjs",
            "@xenolithengine/graph-core": "https://unpkg.com/@xenolithengine/graph-core@0.7.0-beta.3/dist/index.js",
            "@xenolithengine/graph-theme-xen": "https://unpkg.com/@xenolithengine/graph-theme-xen@0.7.0-beta.3/dist/index.js",
            "@xenolithengine/graph-render-pixi": BASE + "index.js",
            "@xenolithengine/graph-editor": editorBlobUrl,
            "https://unpkg.com/@xenolithengine/graph-render-pixi@0.7.0-beta.3/dist/comment-renderer.js": commentBlobUrl,
            "https://unpkg.com/@xenolithengine/graph-render-pixi@0.7.0-beta.3/dist/widget-renderer.js": widgetBlobUrl
          }
        });
        document.head.appendChild(im);

        startApp();
      } catch (e) {
        console.error('パッチ失敗:', e);
        document.getElementById('loading').textContent = 'パッチのフェッチまたは適用中にエラーが発生しました。';
      }
    }

    function startApp() {
      const ms = document.createElement('script');
      ms.type = 'module';
      ms.textContent = `
        import { XenolithEditor } from '@xenolithengine/graph-editor';
        import { xenTheme } from '@xenolithengine/graph-render-pixi';

        const customTheme = JSON.parse(JSON.stringify(xenTheme));

        const stressNodeSchema = {
          type: 'StressNode',
          title: '負荷テストノード',
          category: 'logic',
          pins: [
            { id: 'in1', kind: 'data', direction: 'in', type: 'object', label: 'Str Input' },
            { id: 'in2', kind: 'data', direction: 'in', type: 'float', label: 'Num Input' },
            { id: 'in3', kind: 'data', direction: 'in', type: 'string', label: 'Slider Value' },
            { id: 'in4', kind: 'data', direction: 'in', type: 'string', label: 'Combo Select' },
            { id: 'out1', kind: 'data', direction: 'out', type: 'object', label: 'out1' },
            { id: 'out2', kind: 'data', direction: 'out', type: 'float', label: 'out2' },
            { id: 'out3', kind: 'data', direction: 'out', type: 'string', label: 'out3' },
            { id: 'out4', kind: 'data', direction: 'out', type: 'object', label: 'out4' }
          ],
          widgets: [
            { id: 'in_3', type: 'text', pinKey: 'Str Input', key: 'str_val', label: '', height: 24, visibility: 'always' },
            { id: 'in_2', type: 'number', pinKey: 'Num Input', key: 'num_val', label: '', height: 24, visibility: 'always' },
            { id: 'slider_val', type: 'slider', pinKey: 'Slider Value', key: 'slider_val', label: '', min: 0, max: 100, height: 24, visibility: 'always' },
            { id: 'combo_val', type: 'combo', pinKey: 'Combo Select', key: 'combo_val', label: '', values: ['Option A', 'Option B', 'Option C'], height: 24, visibility: 'always' }
          ]
        };

        function generateLargeGraph() {
          const numIslands = 1000;
          const nodesPerIsland = 10;
          const cols = 40;
          const cellW = 2200;
          const cellH = 1050;

          const nodes = [];
          const edges = [];
          const comments = [];

          const colors = [
            '#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6',
            '#ec4899', '#14b8a6', '#f97316', '#06b6d4', '#a855f7'
          ];

          const categories = {};
          colors.forEach((col, idx) => {
            categories['island_cat_' + idx] = { color: col };
          });

          for (let k = 0; k < numIslands; k++) {
            const col = k % cols;
            const row = Math.floor(k / cols);
            const islandX = col * cellW;
            const islandY = row * cellH;
            const colorIndex = k % colors.length;
            const islandColor = colors[colorIndex];
            const categoryName = 'island_cat_' + colorIndex;

            const islandNodes = [];
            for (let i = 0; i < nodesPerIsland; i++) {
              const nodeIndex = k * nodesPerIsland + i;
              const nodeId = 'node_' + nodeIndex;

              const nCol = i % 5;
              const nRow = Math.floor(i / 5);
              const nodeX = islandX + nCol * 420 + 80;
              const nodeY = islandY + nRow * 320 + 90;

              nodes.push({
                id: nodeId,
                type: 'StressNode',
                position: { x: nodeX, y: nodeY },
                size: { x: 360, y: 240 },
                render: { title: 'Node ' + (nodeIndex + 1), category: categoryName },
                state: { num_val: 42, str_val: 'Test Value', slider_val: 75, combo_val: 'Option A' },
                pins: [
                  { id: nodeId + '.in1', kind: 'data', direction: 'in', type: 'object', label: 'Str Input', multiple: true },
                  { id: nodeId + '.in2', kind: 'data', direction: 'in', type: 'float', label: 'Num Input', multiple: true },
                  { id: nodeId + '.in3', kind: 'data', direction: 'in', type: 'string', label: 'Slider Value', multiple: true },
                  { id: nodeId + '.in4', kind: 'data', direction: 'in', type: 'string', label: 'Combo Select', multiple: true },
                  { id: nodeId + '.out1', kind: 'data', direction: 'out', type: 'object', label: 'out1', multiple: true },
                  { id: nodeId + '.out2', kind: 'data', direction: 'out', type: 'float', label: 'out2', multiple: true },
                  { id: nodeId + '.out3', kind: 'data', direction: 'out', type: 'string', label: 'out3', multiple: true },
                  { id: nodeId + '.out4', kind: 'data', direction: 'out', type: 'object', label: 'out4', multiple: true }
                ],
                widgets: [
                  { id: 'in_3', type: 'text', pinKey: 'Str Input', key: 'str_val', label: '', height: 24, visibility: 'always' },
                  { id: 'in_2', type: 'number', pinKey: 'Num Input', key: 'num_val', label: '', height: 24, visibility: 'always' },
                  { id: 'slider_val', type: 'slider', pinKey: 'Slider Value', key: 'slider_val', label: '', min: 0, max: 100, height: 24, visibility: 'always' },
                  { id: 'combo_val', type: 'combo', pinKey: 'Combo Select', key: 'combo_val', label: '', values: ['Option A', 'Option B', 'Option C'], height: 24, visibility: 'always' }
                ]
              });
              islandNodes.push(nodeId);
            }

            comments.push({
              id: 'frame_' + k,
              position: { x: islandX + 40, y: islandY + 40 },
              size: { x: 2100, y: 900 },
              text: 'Island ' + (k + 1),
              color: islandColor
            });

            for (let i = 0; i < nodesPerIsland - 1; i++) {
              const u = islandNodes[i];
              const v = islandNodes[i + 1];
              edges.push({ id: 'edge_' + u + '_' + v + '_1', from: { node: u, pin: u + '.out1' }, to: { node: v, pin: v + '.in1' } });
              edges.push({ id: 'edge_' + u + '_' + v + '_2', from: { node: u, pin: u + '.out2' }, to: { node: v, pin: v + '.in2' } });
            }

            if (k < numIslands - 1) {
              const sourceNodeId = islandNodes[4];
              const targetNodeId = 'node_' + ((k + 1) * nodesPerIsland + 2);
              edges.push({ id: 'edge_inter_' + k, from: { node: sourceNodeId, pin: sourceNodeId + '.out3' }, to: { node: targetNodeId, pin: targetNodeId + '.in3' } });
            }
          }

          return { version: 'xenolith.v1', categories, nodes, edges, comments };
        }

        async function init() {
          try {
            const largeGraph = generateLargeGraph();
            const editor = await XenolithEditor.init('#editor-container', { theme: customTheme, minimap: true, zoomBounds: [0.03, 2] });

            editor.registry.register(stressNodeSchema);
            editor.setControls({ position: 'top-right', orientation: 'horizontal' });
            editor.setIsValidConnection(({ from, to }) => from.node !== to.node);
            
            editor.loadJSON(largeGraph);
            editor.fitView({ padding: 150, maxZoom: 1 });

            if (editor.chrome && typeof editor.chrome.setStatsVisible === 'function') {
              editor.chrome.setStatsVisible(true);
            } else if (typeof editor.setStatsVisible === 'function') {
              editor.setStatsVisible(true);
            }
            
            document.body.classList.add('loaded');
          } catch (e) {
            console.error(e);
            document.getElementById('loading').textContent = 'エラーが発生しました。コンソールログを確認してください。';
          }
        }
        init();
      `;
      document.body.appendChild(ms);
    }

    initPatch();
  </script>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">10,000ノード（40,000入力欄）・1,000島・19,999配線を生成中...</div>
  </div>
  
  <div id="guide">
    <h2>10,000ノード 限界負荷テスト</h2>
    <ul>
      <li><span class="accent">1ノードあたり4つの入力欄</span> (文字列、数値、スライダー、コンボ) を配置。合計 **40,000個の入力欄** が同時に描画されます。</li>
      <li>画面右上にエディタ標準の FPS / 統計オーバーレイ を表示しています。</li>
      <li>各島内部のノード同士は順に <span class="accent">2つの配線</span> で接続されています。</li>
    </ul>
  </div>
  <div id="editor-container"></div>
  <div class="copyright">
    &copy; 2026 XenolithEngine Authors. Released under the MIT License.
  </div>
</body>
</html>
